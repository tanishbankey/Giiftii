<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giiftii — AI-Powered Gift Finder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="logo-mark">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2" /><path d="M12 8v13" /><path d="M3 13h18" /><path d="M8 4c0 0-1 4 4 4 5 0 4-4 4-4" /></svg>
            </div>
            <span class="logo-text">Giiftii</span>
        </div>
        <p class="subtitle">AI-Powered Gift Finder — Curated from What's Trending Now</p>
    </header>

    <main id="app-container">
        <section id="form-view" class="form-wrap">
            <p class="section-label">Tell us about the gift recipient</p>

            <div class="field-group">
                <label class="field-label">Your Budget <span class="required">*</span></label>
                <div class="chip-row" id="budget-chips">
                    <button class="chip" data-value="25">Under $25</button>
                    <button class="chip" data-value="50">Under $50</button>
                    <button class="chip" data-value="100">Under $100</button>
                    <button class="chip" data-value="200">Under $200</button>
                    <button class="chip" data-value="500">Under $500</button>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Recipient's Gender <span class="required">*</span></label>
                <div class="chip-row" id="gender-chips">
                    <button class="chip" data-value="Male">♂ Male</button>
                    <button class="chip" data-value="Female">♀ Female</button>
                    <button class="chip" data-value="Non-binary">⚧ Non-binary</button>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Age Range <span class="required">*</span></label>
                <select id="age-range" class="select-input">
                    <option value="">Select age range...</option>
                    <option>13–17 (Teen)</option>
                    <option>18–24 (Young Adult)</option>
                    <option>25–34</option>
                    <option>35–44</option>
                    <option>45–54</option>
                    <option>55+</option>
                </select>
            </div>

            <div class="field-group">
                <label class="field-label">Additional Context (optional)</label>
                <textarea id="context" class="textarea-input" placeholder="Hobbies, interests, favorite brands..."></textarea>
            </div>

            <button id="find-gifts-btn" class="primary-button" disabled>
                <span>🔍 Find 40 Perfect Gifts</span>
            </button>
        </section>

        <section id="loading-view" class="loading-wrap hidden">
            <div class="spinner"></div>
            <p id="loading-msg">Scanning trending products...</p>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </section>

        <section id="results-view" class="results-wrap hidden">
            <button class="back-btn" onclick="resetApp()">← New Search</button>
            <div class="results-header">
                <h2 class="results-title">Your Curated Gift List</h2>
            </div>
            <div id="results-container" class="results-grid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
